<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Acceso — M2KCULT</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/auth.css">
</head>
<body class="auth-body">

  <!-- Video Background (fixed, never reloads) -->
  <div class="auth-bg">
    <video class="auth-video" autoplay muted loop playsinline>
      <source src="assets/videos/C1201.MP4" type="video/mp4">
    </video>
    <div class="auth-overlay"></div>
  </div>

  <!-- Page content (above video) -->
  <div class="auth-page-content">

    <!-- Announcement Bar -->
    <div class="announcement">Nueva Colección &nbsp;|&nbsp; Disponible Ahora</div>

    <!-- Navbar -->
    <header class="site-header">
      <button class="nav-hamburger" id="navHamburgerBtn" type="button" aria-label="Abrir menú" aria-expanded="false" aria-controls="mobileNavOverlay">
        <svg class="nav-icon" viewBox="0 0 24 24">
          <line x1="3" y1="6" x2="21" y2="6"/>
          <line x1="3" y1="12" x2="21" y2="12"/>
          <line x1="3" y1="18" x2="21" y2="18"/>
        </svg>
      </button>

      <a class="nav-logo" href="index.html">
        <img src="assets/logos/logoBlanco.png" alt="M2KCULT">
      </a>
      <ul class="nav-links">
        <li><a href="index.html#coleccion">Tienda</a></li>
        <li><a href="contacto.html">Contacto</a></li>
      </ul>
      <div class="nav-actions">
        <a href="login.html" class="nav-account-link">Cuenta</a>
      </div>
    </header>

    <div class="mobile-nav-overlay" id="mobileNavOverlay">
      <button class="mobile-nav-close" id="mobileNavCloseBtn" type="button" aria-label="Cerrar menú">&times;</button>
      <nav class="mobile-nav-links">
        <a href="index.html">Inicio</a>
        <a href="index.html#coleccion">Tienda</a>
        <a href="contacto.html">Contacto</a>
      </nav>
      <div class="mobile-nav-divider"></div>
      <div class="mobile-nav-secondary">
        <a href="login.html">Cuenta</a>
      </div>
    </div>

    <!-- Auth Content -->
    <main class="auth-main">

      <a href="index.html" class="auth-logo-link">
        <img src="assets/logos/logoBlanco.png" alt="M2KCULT" class="auth-logo">
      </a>

      <!-- ── LOGIN FORM ── -->
      <div class="auth-card" id="login-card">
        <h1 class="auth-title">Bienvenid@</h1>
        <p class="auth-subtitle">Inicia sesión en tu cuenta</p>

        <form class="auth-form" onsubmit="return handleLogin(event)">
          <div class="auth-field">
            <label class="auth-label" for="login-email">Email</label>
            <input class="auth-input" type="email" id="login-email" placeholder="tu@email.com" autocomplete="email" required>
          </div>
          <div class="auth-field">
            <label class="auth-label" for="login-pw">Contraseña</label>
            <div class="auth-input-wrap">
              <input class="auth-input" type="password" id="login-pw" placeholder="••••••••" autocomplete="current-password" required>
              <button type="button" class="auth-toggle-pw" aria-label="Mostrar contraseña" onclick="togglePw('login-pw','eye-login')">
                <svg id="eye-login" viewBox="0 0 24 24" width="17" height="17" stroke="currentColor" fill="none" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
                </svg>
              </button>
            </div>
          </div>
          <a href="#" class="auth-forgot">¿Olvidaste tu contraseña?</a>
          <p class="auth-error" id="login-error">Email o contraseña incorrectos.</p>
          <button type="submit" class="auth-btn">Entrar &nbsp;→</button>
        </form>

        <div class="auth-divider"><span>o</span></div>
        <p class="auth-switch">¿No tienes cuenta? <a href="#" onclick="showRegister();return false;">Regístrate</a></p>
      </div>

      <!-- ── REGISTER FORM (hidden by default) ── -->
      <div class="auth-card auth-card--hidden" id="register-card">
        <h1 class="auth-title">Crea tu cuenta en M2KCULT</h1>

        <form class="auth-form" onsubmit="return handleRegister(event)">
          <div class="auth-field">
            <label class="auth-label" for="reg-email">Email</label>
            <input class="auth-input" type="email" id="reg-email" placeholder="tu@email.com" autocomplete="email" required>
          </div>
          <div class="auth-field">
            <label class="auth-label" for="reg-pw">Contraseña</label>
            <div class="auth-input-wrap">
              <input class="auth-input" type="password" id="reg-pw" placeholder="Mínimo 8 caracteres" autocomplete="new-password" minlength="8" required>
              <button type="button" class="auth-toggle-pw" aria-label="Mostrar contraseña" onclick="togglePw('reg-pw','eye-reg-pw')">
                <svg id="eye-reg-pw" viewBox="0 0 24 24" width="17" height="17" stroke="currentColor" fill="none" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
                </svg>
              </button>
            </div>
          </div>
          <div class="auth-field">
            <label class="auth-label" for="reg-confirm">Confirmar contraseña</label>
            <div class="auth-input-wrap">
              <input class="auth-input" type="password" id="reg-confirm" placeholder="Repite tu contraseña" autocomplete="new-password" required>
              <button type="button" class="auth-toggle-pw" aria-label="Mostrar contraseña" onclick="togglePw('reg-confirm','eye-reg-confirm')">
                <svg id="eye-reg-confirm" viewBox="0 0 24 24" width="17" height="17" stroke="currentColor" fill="none" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
                </svg>
              </button>
            </div>
          </div>
          <label class="auth-checkbox-wrap">
            <input class="auth-checkbox" type="checkbox" name="newsletter">
            <span class="auth-checkbox-label">Acepto recibir novedades y drops exclusivos de M2KCULT</span>
          </label>
          <p class="auth-error" id="register-error"></p>
          <button type="submit" class="auth-btn">Crear Cuenta &nbsp;→</button>
        </form>

        <div class="auth-divider"><span>o</span></div>
        <p class="auth-switch">¿Ya tienes cuenta? <a href="#" onclick="showLogin();return false;">Inicia sesión</a></p>
      </div>

    </main>
  </div>

  <script>
    const EYE_OPEN = '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>';
    const EYE_OFF  = '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/>';

    function togglePw(inputId, iconId) {
      const input = document.getElementById(inputId);
      const show = input.type === 'password';
      input.type = show ? 'text' : 'password';
      document.getElementById(iconId).innerHTML = show ? EYE_OFF : EYE_OPEN;
    }

    function showRegister() {
      document.getElementById('login-card').classList.add('auth-card--hidden');
      document.getElementById('register-card').classList.remove('auth-card--hidden');
      history.pushState({ form: 'register' }, '', 'register.html');
    }

    function showLogin() {
      document.getElementById('register-card').classList.add('auth-card--hidden');
      document.getElementById('login-card').classList.remove('auth-card--hidden');
      history.pushState({ form: 'login' }, '', 'login.html');
    }

    // Show register if loaded via ?form=register redirect
    if (new URLSearchParams(location.search).get('form') === 'register') {
      document.getElementById('login-card').classList.add('auth-card--hidden');
      document.getElementById('register-card').classList.remove('auth-card--hidden');
      history.replaceState({ form: 'register' }, '', 'register.html');
    }

    // Browser back/forward
    window.addEventListener('popstate', e => {
      const reg = e.state && e.state.form === 'register';
      document.getElementById('login-card').classList.toggle('auth-card--hidden', reg);
      document.getElementById('register-card').classList.toggle('auth-card--hidden', !reg);
    });

    function handleLogin(e) {
      e.preventDefault();
      const email = document.getElementById('login-email').value;
      const pw    = document.getElementById('login-pw').value;
      if (email && pw.length >= 6) {
        localStorage.setItem('mk2cult_user', email);
        window.location.href = 'index.html';
      } else {
        const el = document.getElementById('login-error');
        el.textContent = 'Email o contraseña incorrectos.';
        el.classList.add('visible');
        setTimeout(() => el.classList.remove('visible'), 3500);
      }
      return false;
    }

    function handleRegister(e) {
      e.preventDefault();
      const email   = document.getElementById('reg-email').value;
      const pw      = document.getElementById('reg-pw').value;
      const confirm = document.getElementById('reg-confirm').value;
      const el      = document.getElementById('register-error');
      if (pw !== confirm) {
        el.textContent = 'Las contraseñas no coinciden.';
        el.classList.add('visible');
        setTimeout(() => el.classList.remove('visible'), 3500);
        return false;
      }
      if (pw.length < 8) {
        el.textContent = 'La contraseña debe tener mínimo 8 caracteres.';
        el.classList.add('visible');
        setTimeout(() => el.classList.remove('visible'), 3500);
        return false;
      }
      localStorage.setItem('mk2cult_user', email);
      window.location.href = 'index.html';
      return false;
    }

    if (localStorage.getItem('mk2cult_user')) {
      window.location.href = 'index.html';
    }
  </script>
  <script src="js/nav.js"></script>

</body>
</html>
